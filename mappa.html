<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mappa ENRI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1117;
color:white;
height:100vh;
display:flex;
}

#map{
flex:1;
}

.sidebar{
width:320px;
background:#1a1d27;
border-left:1px solid #2e3347;
display:flex;
flex-direction:column;
}

.sidebar-head{
padding:15px;
border-bottom:1px solid #2e3347;
}

.sidebar-title{
font-size:12px;
color:#6b7080;
margin-bottom:10px;
}

.filter-row{
display:flex;
flex-wrap:wrap;
gap:5px;
}

.filter-btn{
font-size:11px;
padding:4px 8px;
background:#22263a;
border:1px solid #2e3347;
color:#aaa;
cursor:pointer;
border-radius:10px;
}

.filter-btn:hover{
color:white;
border-color:#4f8ef7;
}

.sidebar-body{
flex:1;
overflow:auto;
}

.lotto{
padding:10px 15px;
border-bottom:1px solid #2e3347;
cursor:pointer;
}

.lotto:hover{
background:#22263a;
}

.legend{
padding:15px;
border-top:1px solid #2e3347;
}

.legend-item{
font-size:11px;
margin-bottom:6px;
display:flex;
align-items:center;
gap:8px;
}

.legend-line{
width:20px;
height:4px;
border-radius:2px;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="sidebar">

<div class="sidebar-head">

<div class="sidebar-title">Filtra lotto</div>

<div class="filter-row" id="filterRow"></div>

</div>

<div class="sidebar-body" id="lottoList"></div>

<div class="legend">

<div class="legend-item">
<div class="legend-line" style="background:#4a4f6a"></div>
In Attesa
</div>

<div class="legend-item">
<div class="legend-line" style="background:#c9a227"></div>
In Redazione
</div>

<div class="legend-item">
<div class="legend-line" style="background:#e07b3a"></div>
In Firma RDS
</div>

<div class="legend-item">
<div class="legend-line" style="background:#4f8ef7"></div>
Inviato
</div>

<div class="legend-item">
<div class="legend-line" style="background:#2f5496"></div>
Protocollato
</div>

<div class="legend-item">
<div class="legend-line" style="background:#3a8c5c"></div>
Ottenuto
</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const COLORS = {

"IN ATTESA":"#4a4f6a",
"IN REDAZIONE":"#c9a227",
"IN FIRMA RDS":"#e07b3a",
"INVIATO":"#4f8ef7",
"PROTOCOLLATO":"#2f5496",
"OTTENUTO":"#3a8c5c"

}

function getColor(stato){
return COLORS[stato] || "#4a4f6a"
}

const map = L.map('map').setView([45.4,9.2],9)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap'}
).addTo(map)

let geoLayer

function popupHTML(p){

return `
<b>Lotto:</b> ${p.LOTTO || "-"}<br>
<b>Comune:</b> ${p.COMUNE || "-"}<br>
<b>Provincia:</b> ${p.PROVINCIA || "-"}<br>
<b>Ente:</b> ${p.ENTE || "-"}<br>
<b>Tipologia:</b> ${p.TIPOLOGIA || "-"}<br>
<b>Stato:</b> ${p.STATO_AUTORIZZAZIONE || "-"}
`

}

async function loadData(){

const res = await fetch("QGIS.geojson")
const geo = await res.json()

geoLayer = L.geoJSON(geo,{

style:f=>({
color:getColor(f.properties.STATO_AUTORIZZAZIONE),
weight:4
}),

onEachFeature:(feature,layer)=>{

layer.bindPopup(
popupHTML(feature.properties)
)

}

}).addTo(map)

map.fitBounds(geoLayer.getBounds())

buildSidebar(geo.features)

}

function buildSidebar(features){

const lotti = {}

features.forEach(f=>{

const lotto = f.properties.LOTTO

if(!lotto) return

if(!lotti[lotto]) lotti[lotto]=0

lotti[lotto]++

})

const list = document.getElementById("lottoList")

Object.keys(lotti).forEach(lotto=>{

const div = document.createElement("div")

div.className="lotto"

div.innerHTML="Lotto "+lotto+" ("+lotti[lotto]+")"

div.onclick=()=>zoomLotto(lotto)

list.appendChild(div)

})

}

function zoomLotto(lotto){

geoLayer.eachLayer(layer=>{

if(layer.feature.properties.LOTTO===lotto){

map.fitBounds(layer.getBounds())

}

})

}

loadData()

</script>

</body>
</html>
