<!DOCTYPE html>
<html lang="it" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENRI — Executive Summary</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fb;--surface:#ffffff;--surface2:#eef1f8;--border:#d4dae8;
  --accent:#1e56a0;--accent2:#2563b0;--text:#1a2340;--muted:#5a6480;
  --green:#1a7a46;--yellow:#b07d10;--red:#b82020;
  --blue-header:#1e3a6e;--blue-row:#2563b0;--blue-light:#e8f0fd;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{display:flex;align-items:center;padding:0 20px;height:52px;background:var(--blue-header);border-bottom:1px solid #152b55;gap:10px;position:sticky;top:0;z-index:100;}
.logo-txt{font-size:13px;font-weight:600;letter-spacing:.12em;color:#ffffff;text-transform:uppercase;white-space:nowrap;}
.dv{width:1px;height:20px;background:#3a5580;flex-shrink:0;}
.pg-title{font-size:13px;color:#b8c8e8;white-space:nowrap;}
.edit-hint{display:none;font-size:10px;color:#b8d8f8;padding:3px 10px;background:#1a3a6e;border-radius:4px;white-space:nowrap;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.btn{font-size:11px;padding:5px 14px;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;text-decoration:none;border:none;transition:all .18s;white-space:nowrap;}
.btn:hover{opacity:.82;}
.btn-nav{background:#1a3a6e;color:#c8d8f0;border:1px solid #3a5580;}
.btn-edit{background:#dce8fc;color:var(--accent2);border:1px solid #2563b055;}
.btn-edit.on{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.btn-cancel{display:none;background:#cc333322;color:var(--red);border:1px solid #cc333355;}
.btn-cancel:hover{background:var(--red);color:#fff;}
.btn-print{background:#d0f0e0;color:var(--green);border:1px solid #1a7a4655;}
.btn-print:hover{background:var(--green);color:#fff;}
.badge{font-size:11px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:4px;background:#152b55;border:1px solid #3a5580;color:#b8c8e8;}
.main{padding:20px 24px 32px;display:flex;flex-direction:column;gap:16px;max-width:1440px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:visible;box-shadow:0 2px 8px rgba(30,60,100,.07);}
.ch{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--surface2);}
.ct{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.cb{padding:16px 18px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.four-col{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
@media(max-width:900px){.two-col,.four-col{grid-template-columns:1fr;}}
.rag{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;flex-shrink:0;}
.rg{background:var(--green);color:#fff;} .ry{background:var(--yellow);color:#fff;} .rr{background:var(--red);color:#fff;} .rm{background:#4a4f6a;color:#fff;}
.rag-sel{display:none;font-size:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:4px;padding:2px 5px;cursor:pointer;}
.em .rag-sel{display:inline-block;}
.em .rag{display:none;}
.dt{width:100%;border-collapse:collapse;font-size:11px;}
.dt th{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#fff;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--blue-header);}
.dt td{padding:7px 10px;border-bottom:1px solid #2e334722;vertical-align:middle;line-height:1.4;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:#e8f0fd;}
.cd{font-family:'DM Mono',monospace;font-size:10px;white-space:nowrap;}
.cf{font-family:'DM Mono',monospace;font-size:10px;white-space:nowrap;}
.pb-w{display:flex;align-items:center;gap:8px;}
.pb{flex:1;height:5px;background:#d4dae8;border-radius:3px;overflow:hidden;min-width:40px;}
.pb-f{height:100%;border-radius:3px;}
.pb-p{font-size:10px;font-family:'DM Mono',monospace;width:34px;text-align:right;flex-shrink:0;}
.sc{background:#f8faff;border:1px solid var(--border);border-radius:8px;padding:13px 14px;}
.sc-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
.sc-name{font-size:13px;font-weight:700;}
.sc-tot{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);white-space:nowrap;}
.sc-row{display:grid;grid-template-columns:148px 1fr 52px;align-items:center;gap:6px;margin-bottom:5px;font-size:10px;}
.sc-row:last-child{margin-bottom:0;}
.sc-l{color:#4a5a7a;}
.sc-n{font-family:'DM Mono',monospace;font-size:9px;text-align:right;}
.cl-badge{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#dce8fc,#d0f0e0);border:1px solid #2563b033;border-radius:8px;padding:8px 12px;margin-top:10px;}
.cl-badge-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.cl-badge-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent2);line-height:1;}
.cl-badge-sub{font-size:9px;color:var(--muted);margin-top:1px;font-family:'DM Mono',monospace;}
.mc{background:#f8faff;border:1px solid var(--border);border-radius:8px;padding:13px 15px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px;}
.mcg::before{background:var(--green);} .mcy::before{background:var(--yellow);} .mcr::before{background:var(--red);} .mcm::before{background:#4a4f6a;}
.mc-title{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:5px;}
.mc-meta{display:flex;gap:10px;font-size:10px;color:var(--muted);flex-wrap:wrap;margin-bottom:6px;align-items:center;}
.mc-note{font-size:11px;color:var(--muted);line-height:1.6;}
.em [contenteditable='true']{outline:1px dashed #2563b066;border-radius:3px;padding:1px 4px;cursor:text;transition:outline .15s;}
.em [contenteditable='true']:focus{outline:2px solid var(--accent2);background:#e8f0fd;}
.em [contenteditable='true']:hover:not(:focus){outline:1px dashed var(--accent);}
.em .edit-hint{display:inline-block;}
.del-btn{display:none;background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;padding:0 3px;opacity:.65;line-height:1;}
.del-btn:hover{opacity:1;}
.em .del-btn{display:inline-flex;align-items:center;}
.add-btn{display:none;width:100%;padding:8px;background:transparent;border:1px dashed #2563b055;border-radius:8px;color:var(--accent2);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;margin-top:8px;}
.add-btn:hover{background:#e8f0fd;border-color:var(--accent2);}
.em .add-btn{display:block;}
.note-box{background:#fffbf0;border:1px solid #e8d8a0;border-radius:7px;padding:11px 14px;font-size:11px;color:var(--text);line-height:1.7;position:relative;}
.note-box+.note-box{margin-top:8px;}
@media print{
  @page{ size:A4 portrait; margin:10mm 10mm 10mm 10mm; }
  *{ -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; }
  body{ background:#ffffff!important; color:#1a2340!important; font-size:8pt; font-family:'DM Sans',sans-serif; }
  .topbar,.no-print,.rag-sel,.del-btn,.add-btn,.btn-cancel,.edit-hint{ display:none!important; }
  .rag{ display:inline-flex!important; }
  [contenteditable]{ outline:none!important; background:transparent!important; padding:0!important; }
  #printHeader{ display:flex!important; align-items:center; padding:0 0 6pt 0; margin-bottom:7pt; border-bottom:2px solid #4f8ef755; }
  .main{ padding:0!important; max-width:100%!important; gap:6pt!important; }
  .main > .card:first-child{ break-inside:avoid; break-after:avoid; margin-bottom:5pt; }
  #permitCard{ break-before:avoid; break-inside:avoid; break-after:avoid; margin-bottom:5pt; }
  #permitCard .four-col{ grid-template-columns:1fr 1fr 1fr 1fr!important; gap:5pt!important; }
  .two-col{ gap:6pt!important; break-before:avoid; break-after:avoid; display:grid!important; grid-template-columns:1fr 1fr!important; }
  .two-col > .card{ break-inside:avoid; break-before:avoid; }
  #mmCard{ break-before:page!important; margin-bottom:6pt; }
  #notesCard{ break-inside:avoid; }
  .card{ border:1px solid #d4dae8!important; background:#ffffff!important; border-radius:6px!important; break-inside:avoid; overflow:visible!important; }
  .ch{ background:#eef1f8!important; border-bottom:1px solid #d4dae8!important; padding:4px 12px!important; }
  .ct{ color:#3a4a6a!important; font-size:7pt!important; letter-spacing:.1em; }
  .cb{ padding:7px 12px!important; }
  .sc{ background:#f8faff!important; border:1px solid #d4dae8!important; padding:6px 9px!important; break-inside:avoid; }
  .sc-name{ font-size:8.5pt!important; }
  .sc-tot{ font-size:8pt!important; }
  .sc-row{ grid-template-columns:120px 1fr 44px!important; gap:4px!important; margin-bottom:3px!important; font-size:7.5pt!important; }
  .sc-l{ font-size:7.5pt!important; }
  .sc-n{ font-size:7pt!important; }
  .pb{ background:#d4dae8!important; }
  .cl-badge{ padding:4px 10px!important; background:#e8f0fd!important; border-color:#4f8ef733!important; }
  .cl-badge-val{ font-size:14pt!important; }
  .cl-badge-sub{ font-size:7pt!important; }
  .dt{ font-size:7.5pt!important; }
  .dt th{ font-size:6.5pt!important; padding:3px 6px!important; }
  .dt td{ padding:3px 6px!important; line-height:1.3; }
  .dt tr:hover td{ background:transparent!important; }
  .mc{ background:#f8faff!important; border:1px solid #d4dae8!important; padding:7px 11px!important; break-inside:avoid; margin-bottom:5pt; }
  .mc-title{ font-size:8.5pt!important; }
  .mc-meta{ font-size:7.5pt!important; gap:8px!important; }
  .mc-note{ font-size:7.5pt!important; }
  .pb-w{ min-width:60px; }
  .note-box{ background:#fffbf0!important; border:1px solid #e8d8a0!important; padding:8px 12px!important; }
}</style>
</head>

    if (!resp.ok) resp = await fetch('riepilogo.csv?t='+Date.now());
    if (!resp.ok) throw new Error('CSV non trovato');
    const text = await resp.text();
    const lines = text.trim().split('\n').map(l=>l.replace(/\r/,''));
    const sep = lines[0].includes(';') ? ';' : ',';
    const splitL = line => {
      const res=[]; let cur='', inQ=false;
      for(const ch of line){
        if(ch==='"'){inQ=!inQ;}
        else if(ch===sep&&!inQ){res.push(cur.trim());cur='';}
        else{cur+=ch;}
      }
      res.push(cur.trim()); return res;
    };
    const hdr = splitL(lines[0]);
    const iC  = hdr.findIndex(h=>h.trim().toUpperCase()==='CLUSTER');
    const iL  = hdr.findIndex(h=>h.trim().toUpperCase()==='LUNGHEZZA');
    const iLt = hdr.findIndex(h=>h.trim().toUpperCase()==='LOTTO');
    const iS  = hdr.findIndex(h=>h.trim().toUpperCase()==='STATO_LEGENDA');
    if(iC<0||iL<0||iLt<0||iS<0) throw new Error('Colonne non trovate');

    const byLot={}, byCluster={};
    for(let i=1;i<lines.length;i++){
      const c=splitL(lines[i]);
      if(c.length<=Math.max(iC,iL,iLt,iS)) continue;
      const lot=c[iLt].trim(), stato=c[iS].trim(), cl=c[iC].trim().replace(/"/g,'');
      const m=parseFloat(c[iL].trim().replace(',','.'))||0;
      if(!stato||m<=0) continue;
      if(SUPPLIER_META[lot]){
        if(!byLot[lot])byLot[lot]={};
        byLot[lot][stato]=(byLot[lot][stato]||0)+m;
      }
      if(cl){
        if(!byCluster[cl])byCluster[cl]={};
        byCluster[cl][stato]=(byCluster[cl][stato]||0)+m;
      }
    }

    // ── MODIFICATO: aggiunto coordinamento nel GK ──
    const GK={
      wip:          ['IN ATTESA','IN REDAZIONE','IN REDAZIONE INTEGRAZIONE'],
      coordinamento:['COORDINAMENTO'],
      firma:        ['IN FIRMA RDS'],
      inviato:      ['INVIATO','PROTOCOLLATO'],
      integr:       ['NECESSARIA INTEGRAZIONE','PROTOCOLLATO INTEGRAZIONE'],
      ok:           ['OTTENUTO'],
    };

    CSV_DATA={};
    Object.entries(SUPPLIER_META).forEach(([lot,meta])=>{
      const d=byLot[lot]||{};
      const tot=Object.values(d).reduce((s,v)=>s+v,0);
      // ── MODIFICATO: aggiunto coordinamento nel CSV_DATA build ──
      CSV_DATA[lot]={...meta, tot,
        wip:          GK.wip.reduce((s,st)=>s+(d[st]||0),0),
        coordinamento:GK.coordinamento.reduce((s,st)=>s+(d[st]||0),0),
        firma:        GK.firma.reduce((s,st)=>s+(d[st]||0),0),
        inviato:      GK.inviato.reduce((s,st)=>s+(d[st]||0),0),
        integr:       GK.integr.reduce((s,st)=>s+(d[st]||0),0),
        ok:           GK.ok.reduce((s,st)=>s+(d[st]||0),0),
      };
    });

    CLUSTER_PROGRESS={};
    Object.entries(byCluster).forEach(([cl,d])=>{
      const tot=Object.values(d).reduce((s,v)=>s+v,0);
      const avanz=AVANZATI_STATI.reduce((s,st)=>s+(d[st]||0),0);
      CLUSTER_PROGRESS[cl]={tot,avanz};
    });
  } catch(e) {
    console.warn('loadCSVData:', e.message);
  }
}

const FORECAST_START_DATE = '2026-02-12';
const FORECAST_TOTAL_DAYS = 365; // previsione lineare semplice su 12 mesi

function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

function getTimeForecastPct() {
  const start = new Date(FORECAST_START_DATE + 'T00:00:00');
  const today = new Date();
  const elapsed = Math.floor((today - start) / (1000*60*60*24));
  return clamp((elapsed / FORECAST_TOTAL_DAYS) * 100, 0, 100);
}

function lotActualPct(lot, task){
  const d = CSV_DATA[lot];
  if(!d || !d.tot) return 0;
  if(task === 'submission') return ((d.inviato + d.integr + d.ok) / d.tot) * 100;
  if(task === 'approval') return (d.ok / d.tot) * 100;
  if(task === 'delivery') return 0;
  return 0;
}

function clusterActualPct(lots, task){
  let done = 0, tot = 0;
  lots.forEach(lot => {
    const d = CSV_DATA[lot];
    if(!d || !d.tot) return;
    const a = lotActualPct(lot, task);
    done += (a/100) * d.tot;
    tot += d.tot;
  });
  if(!tot) return 0;
  return (done / tot) * 100;
}

      tot += d.tot;
    });
    return tot > 0 ? Math.min(100, (done / tot) * 100) : 0;

  var clBadge = {
    'null':'<span style="display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;background:#e8ecf8;border:1px solid #c0c8e0;color:#4a5a7a">—</span>',
    '1':   '<span style="display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;background:#dce8fc;border:1px solid #2563b055;color:#1e56a0">C1</span>',
    '2':   '<span style="display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;background:#fff3d0;border:1px solid #b07d1055;color:#8a5c00">C2</span>',
  };

  // Ordine: task generici (null), poi tutti C1 nell'ordine, poi tutti C2 nell'ordine, poi altri cluster
  var rowOrder=[];
  // Prima i task generici
  tasks.filter(function(t){ return !t.cluster; }).forEach(function(t){
    if(rowOrder.indexOf(t.id)<0) rowOrder.push(t.id);
  });
  // Poi C1
  tasks.filter(function(t){ return t.cluster==='1'; }).forEach(function(t){
    if(rowOrder.indexOf(t.id)<0) rowOrder.push(t.id);
  });
  // Poi C2
  tasks.filter(function(t){ return t.cluster==='2'; }).forEach(function(t){
    if(rowOrder.indexOf(t.id)<0) rowOrder.push(t.id);
  });
  // Poi altri
  tasks.forEach(function(t){
    if(rowOrder.indexOf(t.id)<0) rowOrder.push(t.id);
  });

  var CL_W=38, LABEL_W=175, PCT_W=40;
  var gridCols=CL_W+'px '+LABEL_W+'px repeat('+N+', 1fr) '+PCT_W+'px';

  var editHint = editOn
    ? '<span style="font-size:9px;color:var(--accent2);background:#e8f0fd;border:1px solid #2563b033;border-radius:3px;padding:2px 8px;margin-left:8px">✏ Clicca barra per modificare · ＋ per aggiungere task</span>'
    : '';

  var ganttHtml = '';
  ganttHtml += '<div style="overflow-x:auto"><div style="min-width:660px">';
  // Header
  ganttHtml += '<div style="display:grid;grid-template-columns:'+gridCols+';background:var(--blue-header);border-radius:6px 6px 0 0">';
  ganttHtml += '<div style="padding:5px 3px;font-size:9px;font-weight:600;color:#b8c8e8;text-align:center;border-right:1px solid #3a5580">Cl.</div>';
  ganttHtml += '<div style="padding:5px 8px;font-size:9px;font-weight:600;color:#b8c8e8;border-right:1px solid #3a5580">Task</div>';
  MONTH_LABELS.forEach(function(m){
    ganttHtml += '<div style="padding:5px 2px;font-size:8px;color:#b8c8e8;text-align:center;border-left:1px solid #3a5580">'+m+'</div>';
  });
  ganttHtml += '<div style="padding:5px 2px;font-size:9px;font-weight:600;color:#b8c8e8;text-align:center;border-left:1px solid #3a5580">%</div>';
  ganttHtml += '</div>';

  ganttHtml += '<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;overflow:hidden">';
  rowOrder.forEach(function(taskId, gi){
    var t = tasks.find(function(x){ return x.id===taskId; });
    if(!t) return;
    var color      = taskColors[t.id]||'#4a5a7a';
    var lightColor = taskLightColors[t.id]||'#e8ecf8';
    var prog       = t.done ? 100 : taskProgress(t.id);
    var pctLabel   = t.done ? '✓' : (prog>0 ? prog.toFixed(0)+'%' : '0%');
    var sDate      = parseD(t.start);
    var eDate      = parseD(t.end);
    var lPct       = pctPos(sDate).toFixed(3);
    var wPct       = pctSpan(sDate, eDate).toFixed(3);
    var fillW      = Math.min(prog,100);
    var rowBg      = (gi%2===0) ? '#ffffff' : '#f8faff';
    var clKey      = String(t.cluster);
    var editAttr   = editOn ? 'onclick="ganttOpenEdit(\''+t.id+'\')" style="cursor:pointer" title="Clicca per modificare date"' : '';
    var editBorder = editOn ? 'outline:1px dashed #2563b055;' : '';
    var pctColor   = prog>=80?'var(--green)':prog>=40?'#b07d10':'var(--accent2)';

    // Separatore visivo tra sezioni
    var prevId = gi>0 ? rowOrder[gi-1] : null;
    var prevT  = prevId ? tasks.find(function(x){ return x.id===prevId; }) : null;
    var sectionBorder = '';
    if(prevT && prevT.cluster !== t.cluster){
      sectionBorder = 'border-top:2px solid #3a5580!important;';
    }

    ganttHtml += '<div style="display:grid;grid-template-columns:'+gridCols+';min-height:28px;border-top:1px solid #e0e6f0;background:'+rowBg+';'+sectionBorder+'">';
    // Cluster badge
    ganttHtml += '<div style="display:flex;align-items:center;justify-content:center;padding:3px 2px;border-right:1px solid #e0e6f0">'+(clBadge[clKey]||clBadge['null'])+'</div>';
    // Label
    ganttHtml += '<div style="display:flex;align-items:center;gap:5px;padding:4px 8px;border-right:1px solid #e0e6f0;font-size:10px;color:var(--text)">';
    ganttHtml += '<span style="display:inline-block;width:7px;height:7px;border-radius:'+(t.done?'50%':'2px')+';background:'+color+';flex-shrink:0"></span>';
    ganttHtml += t.label+'</div>';
    // Timeline
    ganttHtml += '<div style="grid-column:span '+N+';position:relative;height:28px;background:repeating-linear-gradient(to right,transparent 0,transparent calc('+COL_W_PCT+'% - 1px),#dde4f0 calc('+COL_W_PCT+'% - 1px),#dde4f0 calc('+COL_W_PCT+'%))" '+editAttr+'>';
    if(todayPct>0&&todayPct<100){
      ganttHtml += '<div style="position:absolute;top:0;bottom:0;left:'+todayPct.toFixed(2)+'%;width:1.5px;background:#d44;opacity:.85;z-index:2;pointer-events:none"></div>';
    }
    ganttHtml += '<div style="position:absolute;top:5px;left:'+lPct+'%;width:'+wPct+'%;height:18px;background:'+lightColor+';border-radius:3px;border:1px solid '+color+'55;'+editBorder+'" '+editAttr+'>';
    ganttHtml += '<div style="width:'+fillW+'%;height:100%;background:'+color+';border-radius:2px 0 0 2px;opacity:.9"></div>';
    if(prog>=5||t.done){
      ganttHtml += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px #0006;pointer-events:none">'+pctLabel+'</div>';
    }
    ganttHtml += '</div></div>';
    // % col
    ganttHtml += '<div style="display:flex;align-items:center;justify-content:center;border-left:1px solid #e0e6f0">';
    if(t.done){
      ganttHtml += '<span style="font-size:10px;font-weight:700;color:var(--green)">✓</span>';
    } else {
      ganttHtml += '<span style="font-size:9px;font-weight:700;font-family:\'DM Mono\',monospace;color:'+pctColor+'">'+prog.toFixed(0)+'%</span>';
    }
    ganttHtml += '</div>';
    // Pulsante aggiungi task (solo in edit mode, dopo ogni riga)
    if(editOn){
      ganttHtml += '<div style="display:grid;grid-template-columns:'+gridCols+';min-height:16px" onclick="ganttOpenAddTask(\''+t.id+'\')" title="Aggiungi task dopo questa riga" style="cursor:pointer">';
      ganttHtml += '<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:9px;color:var(--accent2)" onmouseover="this.style.opacity=1;this.parentElement.style.background=\'#f0f4ff\'" onmouseout="this.style.opacity=0;this.parentElement.style.background=\'\'">＋ aggiungi task</div>';
      ganttHtml += '</div>';
    }
    ganttHtml += '</div>';
  });
  ganttHtml += '</div>';
  // Pulsante aggiungi in fondo
  if(editOn){
    ganttHtml += '<div onclick="ganttOpenAddTask(\'end\')" title="Aggiungi task in fondo" style="cursor:pointer;padding:6px;text-align:center;border:1px dashed #2563b055;border-top:none;border-radius:0 0 6px 6px;font-size:10px;color:var(--accent2);background:#f8faff" onmouseover="this.style.background=\'#e8f0fd\'" onmouseout="this.style.background=\'#f8faff\'">＋ Aggiungi nuovo task</div>';
  }
  ganttHtml += '</div></div>';

  var legendHtml = '<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:10px;color:var(--muted);align-items:center">';
  [{col:'#1a7a46',label:'Completato'},{col:'#2563b0',label:'D&amp;P Submission'},{col:'#1e3a6e',label:'Permitting approval'},{col:'#7a3a1a',label:'Delivery'},{col:'#b07d10',label:'In corso'}].forEach(function(r){
    legendHtml += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;background:'+r.col+';border-radius:2px;display:inline-block"></span>'+r.label+'</span>';
  });
  legendHtml += '<span style="display:flex;align-items:center;gap:4px"><span style="width:2px;height:12px;background:#d44;display:inline-block"></span> Oggi ('+todayStr+')</span>';
  legendHtml += '<span style="margin-left:auto;font-size:9px">Barra chiara = pianificato · Barra piena = effettivo</span>';
  legendHtml += '</div>';

  // Supplier table
  var taskDefs = [
    { key:'submission', label:'D&amp;P submission<div style="font-size:9px;font-weight:400;color:var(--muted)">INVIATO → OTTENUTO</div>' },
    { key:'approval',   label:'Permit approval<div style="font-size:9px;font-weight:400;color:var(--muted)">Solo OTTENUTO</div>' },
  ];

  var tableRows = '';
  taskDefs.forEach(function(task) {
    tableRows += '<tr style="border-bottom:1px solid var(--border)">';
    tableRows += '<td style="padding:9px 10px;font-size:11px;font-weight:600;color:var(--text);background:var(--surface2)">' + task.label + '</td>';
    suppliers.forEach(function(s) {
      var pct = lotPct(s.lot, task.key);
      var col = pct >= 80 ? 'var(--green)' : pct >= 40 ? '#b07d10' : 'var(--accent2)';
      tableRows += '<td style="padding:9px 10px;text-align:center">';
      tableRows += '<div style="font-size:18px;font-weight:800;font-family:\'DM Mono\',monospace;color:' + col + '">' + pct.toFixed(0) + '%</div>';
      tableRows += '<div style="margin:3px auto 0;width:60px;height:5px;background:#d4dae8;border-radius:3px;overflow:hidden">';
      tableRows += '<div style="width:' + pct + '%;height:100%;background:' + col + ';border-radius:3px"></div></div>';
      tableRows += '</td>';
    });
    tableRows += '</tr>';
  });
  var totalRow = '<tr style="background:var(--blue-light)">';
  totalRow += '<td style="padding:9px 10px;font-size:11px;font-weight:700;color:var(--accent2)">Total (km)</td>';
  suppliers.forEach(function(s) {
    var d = CSV_DATA[s.lot];
    totalRow += '<td style="padding:9px 10px;text-align:center;font-size:12px;font-family:\'DM Mono\',monospace;color:var(--muted)">' + (d ? (d.tot/1000).toFixed(1).replace('.',',') + ' km' : '—') + '</td>';
  });
  totalRow += '</tr>';

  var suppHeader = '<tr style="background:var(--blue-header)"><th style="padding:8px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#b8c8e8;text-align:left;width:160px">Task</th>';
  suppliers.forEach(function(s) {
    suppHeader += '<th style="padding:8px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#b8c8e8;text-align:center">' + s.name + '<br><span style="font-size:8px;color:#7090b8">Lotto ' + s.lot + '</span></th>';
  });
  suppHeader += '</tr>';

  return '<div class="card" id="ganttCard">' +
    '<div class="ch" style="background:var(--blue-header);border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between">' +
      '<span class="ct" style="color:#b8c8e8">Gantt Timeline — Cluster 1 &amp; 2 · Supplier Table</span>' +
      '<div style="display:flex;align-items:center;gap:6px">' +
        '<span style="font-size:10px;color:#7090b8">Oggi: ' + todayStr + ' &nbsp;·&nbsp; Previsione: ' + forecast.toFixed(0) + '%</span>' +
        editHint +
      '</div>' +
    '</div>' +
    '<div class="cb" style="padding:14px 18px;display:flex;flex-direction:column;gap:14px">' +
      '<div>' +
        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px">Gantt Timeline — Cluster 1 &amp; 2</div>' +
        ganttHtml +
        legendHtml +
      '</div>' +
      '<div>' +
        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px">Supplier Progress Table</div>' +
        '<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">' +
          '<table style="width:100%;border-collapse:collapse">' +
            '<thead>' + suppHeader + '</thead>' +
            '<tbody>' + tableRows + totalRow + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}




function ensureGanttCardInDom() {
  const main = document.getElementById('main');
  if (!main) return;
  const permit = document.getElementById('permitCard');
  if (!permit) return;

  const tpl = document.createElement('template');
  tpl.innerHTML = buildExecGanttSection().trim();
  const fresh = tpl.content.firstElementChild;
  if (!fresh) return;

  const old = document.getElementById('ganttCard');
  if (old) {
    old.replaceWith(fresh);
  } else {
    permit.insertAdjacentElement('afterend', fresh);
  }
}

function render(){

  h+=`<div class="card" id="permitCard">

        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:var(--accent2)">${clPct.toFixed(1)}%</div>

    cl.lotti.forEach(lot => {

  </tr></thead><tbody>`;
  R.clusterTimeline.forEach((c,i)=>{
    h+=`<tr>

      <td class="cd" contenteditable="false">${c.b50}</td>
      <td class="cf" contenteditable="false">${c.f50}</td>
      <td class="cd" contenteditable="false">${c.b70}</td>
      <td class="cf" contenteditable="false">${c.f70}</td>
      <td class="cd" contenteditable="false">${c.b100}</td>
      <td class="cf" contenteditable="false">${c.f100}</td>
      <td>${ragSel(c.r,'ct'+i)}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div></div>`;

  h+=`<div class="card" id="mmCard"><div class="ch"><span class="ct">Main Monthly Milestones</span></div>

  <div class="cb" style="display:flex;flex-direction:column;gap:8px" id="notesBody">`;
  R.notes.forEach((n,i)=>{
    h+=`<div class="note-box" id="note_${i}" style="display:flex;gap:8px;align-items:flex-start">
      <div contenteditable="false" style="flex:1">${n}</div>
      <button class="del-btn" style="margin-top:1px" onclick="delRow('note_${i}')">×</button>
    </div>`;
  });
  h+=`</div>
  <button class="add-btn no-print" onclick="addNote()" style="margin:0 18px 14px">+ Add note</button></div>`;

  document.getElementById('main').innerHTML = h;
  document.querySelectorAll('[contenteditable]').forEach(el=>el.contentEditable='false');
}

let editOn=false, savedHTML='';

const JSONBIN_BIN_ID    = '69b3d128b7ec241ddc6545cc';
const JSONBIN_MASTER_KEY = '$2a$10$2kWuCWPZFDiwXDJBkEmituTTW4op2VZF6E52e75IQsMV7FwmXmSsO';
const EXEC_BIN_KEY = 'exec_summary_v1';

async function saveToStorage(){
  setSaveBadge('saving');
  try {
    const getResp = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers:{ 'X-Master-Key': JSONBIN_MASTER_KEY }
    });
    const existing = getResp.ok ? (await getResp.json()).record : {};
    existing[EXEC_BIN_KEY] = document.getElementById('main').innerHTML;
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
      body: JSON.stringify(existing)
    });
    setSaveBadge('saved');
  } catch(e){
    console.warn('Salvataggio JSONBin fallito:', e);
    setSaveBadge('error');
  }
}

async function loadFromStorage(){
  try {
    const resp = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers:{ 'X-Master-Key': JSONBIN_MASTER_KEY }
    });
    if(!resp.ok) return false;
    const data = (await resp.json()).record;
    if(data && data[EXEC_BIN_KEY]){
      document.getElementById('main').innerHTML = data[EXEC_BIN_KEY];
      document.querySelectorAll('[contenteditable]').forEach(el=>el.contentEditable='false');
      return true;
    }
  } catch(e){ console.warn('Caricamento JSONBin fallito:', e); }
  return false;
}

async function resetStorage(){
  if(!confirm('Ripristinare i dati originali per tutti? Le modifiche salvate andranno perse.')) return;
  try {
    const getResp = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers:{ 'X-Master-Key': JSONBIN_MASTER_KEY }
    });
    const existing = getResp.ok ? (await getResp.json()).record : {};
    delete existing[EXEC_BIN_KEY];
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
      body: JSON.stringify(existing)
    });
  } catch(e){ console.warn('Reset fallito:', e); }
  location.reload();
}

function setSaveBadge(state){
  const b=document.getElementById('saveBadge');
  if(!b) return;
  if(state==='saving'){
    b.textContent='⏳ Salvataggio...';
    b.style.color='var(--yellow)'; b.style.borderColor='#b07d1055'; b.style.background='#fef3cd';
    b.style.opacity='1';
  } else if(state==='saved'){
    b.textContent='✓ Salvato per tutti';
    b.style.color='var(--green)'; b.style.borderColor='#1a7a4655'; b.style.background='#d0f0e0';
    b.style.opacity='1';
    setTimeout(()=>{ b.style.opacity='0'; }, 2500);
  } else {
    b.textContent='✕ Errore salvataggio';
    b.style.color='var(--red)'; b.style.borderColor='#b8202055'; b.style.background='#fce8e8';
    b.style.opacity='1';
    setTimeout(()=>{ b.style.opacity='0'; }, 3000);
  }
}

function toggleEdit(){
  if(!editOn){
    savedHTML = document.getElementById('main').innerHTML;
    editOn=true;
    document.body.classList.add('em');
    document.getElementById('btnEdit').classList.add('on');
    document.getElementById('btnEdit').textContent='💾 Salva';
    document.getElementById('btnCancel').style.display='inline-flex';
    document.querySelectorAll('[contenteditable]').forEach(el=>el.contentEditable='true');
    ensureGanttCardInDom(); // rigenera Gantt con pulsanti modifica attivi
  } else {
    editOn=false;
    document.body.classList.remove('em');
    document.getElementById('btnEdit').classList.remove('on');
    document.getElementById('btnEdit').textContent='✏ Modifica';
    document.getElementById('btnCancel').style.display='none';
    document.querySelectorAll('[contenteditable]').forEach(el=>el.contentEditable='false');
    ensureGanttCardInDom(); // rigenera Gantt senza pulsanti modifica
    saveToStorage();
  }
}

function cancelEdit(){
  if(!confirm('Annullare tutte le modifiche?')) return;
  document.getElementById('main').innerHTML = savedHTML;
  editOn=false;
  document.body.classList.remove('em');
  document.getElementById('btnEdit').classList.remove('on');
  document.getElementById('btnEdit').textContent='✏ Modifica';
  document.getElementById('btnCancel').style.display='none';
  document.querySelectorAll('[contenteditable]').forEach(el=>el.contentEditable='false');
  ensureGanttCardInDom();
}

function updRag(sel){
  const r=sel.value;
  const C=ragCol(r);
  const prev=sel.previousElementSibling;
  if(prev?.classList.contains('rag')) prev.className=`rag ${rcls(r)}`;
  sel.style.borderColor=C;
  const card=sel.closest('.mc');
  if(card){
    card.className=`mc ${mccls(r)}`;
    card.querySelectorAll('.mc-meta strong').forEach(el=>{el.style.color=C;});
    const pf=card.querySelector('.pb-f'); if(pf) pf.style.background=C;
    const pp=card.querySelector('.pb-p'); if(pp) pp.style.color=C;
  }
  const tr=sel.closest('tr');
  if(tr){
    const cf=tr.querySelector('.cf');
    if(cf) cf.style.color=C;
  }
}

function delRow(id){
  if(!editOn) return;
  if(!confirm('Eliminare questo elemento?')) return;
  const el=document.getElementById(id);
  if(el) el.remove();
}

function addMm(){
  const body=document.getElementById('mmBody');
  if(!body) return;
  const i='new_'+Date.now();
  const div=document.createElement('div');
  div.innerHTML=mmCard({t:'New milestone',b:'dd/mm/aa',f:'dd/mm/aa',pct:0,r:'grey',note:'Notes...'},i);
  body.appendChild(div.firstElementChild);
  document.querySelectorAll('[contenteditable]').forEach(el=>el.contentEditable=editOn?'true':'false');
}

function addKm(){
  const body=document.getElementById('kmBody');
  if(!body) return;
  const i='new_'+Date.now();
  const tr=document.createElement('tr');
  tr.id='km_'+i;
  const col=ragCol('grey');
  tr.innerHTML=`<td contenteditable="${editOn}">New milestone</td>
    <td class="cd" style="color:${col}" contenteditable="${editOn}">dd/mm/aa</td>
    <td class="cf" style="color:${col}" contenteditable="${editOn}">dd/mm/aa</td>
    <td style="white-space:nowrap">${ragSel('grey','km'+i)} <button class="del-btn" onclick="delRow('km_${i}')">×</button></td>`;
  body.appendChild(tr);
}

function addNote(){
  const body=document.getElementById('notesBody');
  if(!body) return;
  const i='new_'+Date.now();
  const div=document.createElement('div');
  div.id='note_'+i;
  div.className='note-box';
  div.style.cssText='display:flex;gap:8px;align-items:flex-start';
  div.innerHTML=`<div contenteditable="${editOn}" style="flex:1">New note...</div>
    <button class="del-btn" style="margin-top:1px" onclick="delRow('note_${i}')">×</button>`;
  body.appendChild(div);
}

function updateLiveData(){
  const permitCard = document.getElementById('permitCard');
  if(!permitCard) { render(); return; }
  const clusters = [
    {id:'1', name:'Cluster 1', lotti:['1A','1B']},
    {id:'2', name:'Cluster 2', lotti:['2A','2B']},
  ];
  let h = `<div class="ch"><span class="ct">Permit Submission Progress</span></div><div class="cb">`;
  clusters.forEach(cl => {
    const cp = CLUSTER_PROGRESS[cl.id];
    const clPct   = cp ? (cp.avanz/cp.tot*100) : 0;
    const clTot   = cp ? cp.tot : 0;
    const clAvanz = cp ? cp.avanz : 0;
    h+=`<div style="margin-bottom:${cl.id==='1'?'22px':'0'}">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)">
        <div style="font-size:15px;font-weight:700;color:var(--accent2)">${cl.name}</div>
        <div style="flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden">
          <div style="height:100%;border-radius:5px;background:linear-gradient(90deg,#3a8c5c,#4f8ef7);width:${clPct.toFixed(1)}%"></div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:var(--accent2)">${clPct.toFixed(1)}%</div>
          <div style="font-size:9px;color:var(--muted);font-family:'DM Mono',monospace">${fmt(clAvanz)} / ${fmt(clTot)} m submitted+</div>
        </div>
      </div>
      <div class="two-col">`;
    cl.lotti.forEach(lot => {
      const d = CSV_DATA[lot];
      if(!d) return;
      h+=`<div class="sc">
        <div class="sc-h">
          <div><div class="sc-name">${d.name}</div><div style="font-size:9px;color:var(--muted);font-weight:500">Lotto ${lot}</div></div>
          <div class="sc-tot">${fmt(d.tot)} m</div>
        </div>`;
      GROUPS.forEach(g=>{
        const m=d[g.k]||0; if(m<=0) return;
        const pct=d.tot>0?m/d.tot*100:0;
        h+=`<div class="sc-row">
          <span class="sc-l">${g.label}</span>
          <div class="pb" style="height:5px"><div class="pb-f" style="width:${pct}%;background:${g.col}"></div></div>
          <span class="sc-n" style="color:${g.col}">${pct.toFixed(1)}%<br><span style="font-size:8px;color:var(--muted)">${fmt(m)} m</span></span>
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  permitCard.innerHTML = h;
  ensureGanttCardInDom();
}

async function init(){
  const pd=document.getElementById('printDate');
  if(pd) pd.textContent=document.getElementById('repDate')?.textContent||'';
  await loadCSVData();
  const restored = await loadFromStorage();
  if(!restored){
    render();
  } else {
    updateLiveData();
    ensureGanttCardInDom();
  }
  document.querySelectorAll('[contenteditable]').forEach(el=>el.contentEditable='false');
}
init();
</script>
</body>
</html>
